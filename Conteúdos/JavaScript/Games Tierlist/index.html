<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Definitiva - Jogos</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background"></div>
    
    <div class="container">
        <header>
            <h1 class="glow-title">TIERLIST</h1>
        </header>
        
        <main>
            <!-- TIER LIST BOARD -->
            <section class="tierlist-board" id="tierlist">
                
                <div class="tier-row" data-tier="S">
                    <div class="tier-label s-tier">
                        <span class="tier-letter">S</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="A">
                    <div class="tier-label a-tier">
                        <span class="tier-letter">A</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="B">
                    <div class="tier-label b-tier">
                        <span class="tier-letter">B</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="C">
                    <div class="tier-label c-tier">
                        <span class="tier-letter">C</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="D">
                    <div class="tier-label d-tier">
                        <span class="tier-letter">D</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="E">
                    <div class="tier-label e-tier">
                        <span class="tier-letter">E</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

                <div class="tier-row" data-tier="F">
                    <div class="tier-label f-tier">
                        <span class="tier-letter">F</span>
                    </div>
                    <div class="tier-items dropzone"></div>
                </div>

            </section>

            <!-- GAMES POOL -->
            <section class="game-pool-container">
                <div class="pool-header">
                    <h2>🕹️ Banco de Jogos</h2>
                </div>
                <!-- Dropzone so games can be returned here -->
                <div class="games-pool dropzone">
                    <div class="game" draggable="true" title="Minecraft"><img src="assets/icons/minecraft.svg" alt="Minecraft"></div>
                    <div class="game" draggable="true" title="Grand Theft Auto V"><img src="assets/icons/gta5.svg" alt="Grand Theft Auto V"></div>
                    <div class="game" draggable="true" title="Forza Horizon 5"><img src="assets/icons/forza5.svg" alt="Forza Horizon 5"></div>
                    <div class="game" draggable="true" title="Assetto Corsa"><img src="assets/icons/assetto.svg" alt="Assetto Corsa"></div>
                    <div class="game" draggable="true" title="Warhammer 40,000: Darktide"><img src="assets/icons/darktide.svg" alt="Warhammer 40,000: Darktide"></div>
                    <div class="game" draggable="true" title="Counter-Strike 2"><img src="assets/icons/cs2.svg" alt="Counter-Strike 2"></div>
                    <div class="game" draggable="true" title="Valorant"><img src="assets/icons/valorant.svg" alt="Valorant"></div>
                    <div class="game" draggable="true" title="Elden Ring"><img src="assets/icons/eldenring.svg" alt="Elden Ring"></div>
                    <div class="game" draggable="true" title="Cyberpunk 2077"><img src="assets/icons/cyberpunk.svg" alt="Cyberpunk 2077"></div>
                    <div class="game" draggable="true" title="Red Dead Redemption 2"><img src="assets/icons/rdr2.svg" alt="Red Dead Redemption 2"></div>
                    <div class="game" draggable="true" title="The Witcher 3: Wild Hunt"><img src="assets/icons/witcher3.svg" alt="The Witcher 3: Wild Hunt"></div>
                    <div class="game" draggable="true" title="League of Legends"><img src="assets/icons/lol.svg" alt="League of Legends"></div>
                    <div class="game" draggable="true" title="Fortnite"><img src="assets/icons/fortnite.svg" alt="Fortnite"></div>
                    <div class="game" draggable="true" title="Roblox"><img src="assets/icons/roblox.svg" alt="Roblox"></div>
                    <div class="game" draggable="true" title="Clash Royale"><img src="assets/icons/clashroyale.svg" alt="Clash Royale"></div>
                    <div class="game" draggable="true" title="Terraria"><img src="assets/icons/terraria.svg" alt="Terraria"></div>
                    <div class="game" draggable="true" title="Portal 2"><img src="assets/icons/portal2.svg" alt="Portal 2"></div>
                    <div class="game" draggable="true" title="Hollow Knight"><img src="assets/icons/hollowknight.svg" alt="Hollow Knight"></div>
                    <div class="game" draggable="true" title="Apex Legends"><img src="assets/icons/apex.svg" alt="Apex Legends"></div>
                    <div class="game" draggable="true" title="Call of Duty: Warzone"><img src="assets/icons/warzone.svg" alt="Call of Duty: Warzone"></div>
                    <div class="game" draggable="true" title="Rocket League"><img src="assets/icons/rocketleague.svg" alt="Rocket League"></div>
                    <div class="game" draggable="true" title="Rainbow Six Siege"><img src="assets/icons/r6.svg" alt="Rainbow Six Siege"></div>
                    <div class="game" draggable="true" title="God of War Ragnarök"><img src="assets/icons/gow.svg" alt="God of War Ragnarök"></div>
                    <div class="game" draggable="true" title="Baldur’s Gate 3"><img src="assets/icons/bg3.svg" alt="Baldur’s Gate 3"></div>
                    <div class="game" draggable="true" title="Stardew Valley"><img src="assets/icons/stardew.svg" alt="Stardew Valley"></div>
                    <div class="game" draggable="true" title="Need for Speed Heat"><img src="assets/icons/nfs.svg" alt="Need for Speed Heat"></div>
                </div>
            </section>
        </main>
        
        <!-- TRASH BUTTON -->
        <div id="trash-btn" class="dropzone" title="Lixeira">
            🗑️
            <span id="trash-count">0</span>
        </div>

        <!-- TRASH MODAL -->
        <div id="trash-modal" class="modal-hidden">
            <div class="trash-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🗑️ Lixeira</h2>
                    <button id="close-trash">&times;</button>
                </div>
                <div id="trash-dropzone" class="dropzone">
                    <!-- Jogos descartados aparecem aqui -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
