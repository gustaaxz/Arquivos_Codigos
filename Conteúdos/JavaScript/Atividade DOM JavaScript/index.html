<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>RGB</title>
</head>
<body>
    <main>
        <section id="main">
            <div id="text">
                <h1 id="title">Atividade RGB</h1>
                <p id="paragraph">Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum ea doloremque nisi porro tenetur explicabo deleniti, beatae provident sit hic?</p>
            </div>
            <ul>
                <li><button id="background">Alterar cor do fundo</button></li>
                <li><button id="title-color">Alterar cor do título</button></li>
                <li><button id="paragraph-color">Alterar cor do parágrafo</button></li>
                <li><button id="title-font">Alterar fonte do título</button></li>
                <li><button id="paragraph-font">Alterar fonte do parágrafo</button></li>
                <li><button id="all">Alterar Tudo</button></li>
            </ul>
            <div id="num">
                <p id="counter">0</p>
                <div>
                    <button id="add">Aumentar</button>
                    <button id="minus">Diminuir</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
